name: Build and Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Unit tests
        run: npm run test:unit

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Integration tests (VSCode via test-electron)
        run: xvfb-run -a npm test
        continue-on-error: true

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: pentimento-vsix
          path: pentimento-*.vsix
          if-no-files-found: error
